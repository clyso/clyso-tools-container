name: Build and Push Clyso Tools images

on:
    push:
      branches:
        - main
      paths:
        - 'versions.yaml'
        - 'Dockerfile'
    repository_dispatch:
      types: [binary_released]
    workflow_dispatch:
    
concurrency:
  group: build-images
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Install dependencies
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          sudo apt-get update && sudo apt-get install -y jq
      
      - name: Detect versions
        id: detect
        run: |
          chmod +x scripts/detect-versions.sh
          ./scripts/detect-versions.sh

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.count > 0
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-changes.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.clyso.com \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
      
      - name: Build and push
        run: |
          VERSION="${{ matrix.version }}"
          
          # Force fresh tool downloads when triggered externally
          CACHE_FLAG=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            CACHE_FLAG="--no-cache"
            echo "External trigger detected (triggered by: ${{ github.event.client_payload.tool }}) - forcing fresh build without cache"
          fi
          
          docker buildx build \
            ${CACHE_FLAG} \
            --build-arg CEPH_TAG=${VERSION} \
            --build-arg OTTO_VERSION=latest \
            --build-arg O8_VERSION=latest \
            -t harbor.clyso.com/clyso-tools/clyso-tools:${VERSION#v} \
            --push \
            .
