name: Build and Push Clyso Tools images

on:
    push:
      branches:
        - main
      paths:
        - 'versions.yaml'
        - 'Dockerfile'
    repository_dispatch:
      types: [binary_released]
    workflow_dispatch:

permissions:
  contents: read
  id-token: write
    
concurrency:
  group: build-images
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Install dependencies
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          sudo apt-get update && sudo apt-get install -y jq
      
      - name: Detect versions
        id: detect
        run: |
          chmod +x scripts/detect-versions.sh
          ./scripts/detect-versions.sh

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.count > 0
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-changes.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.clyso.com \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
      
      - name: Build and push
        id: build-push
        run: |
          VERSION="${{ matrix.version }}"
          
          # Force fresh tool downloads when triggered externally
          CACHE_FLAG=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            CACHE_FLAG="--no-cache"
            echo "External trigger detected (triggered by: ${{ github.event.client_payload.tool }}) - forcing fresh build without cache"
          fi

          IMAGE_TAG="harbor.clyso.com/clyso-tools/clyso-tools:${VERSION#v}"
          echo "Building and pushing: ${IMAGE_TAG}"
          
          docker buildx build \
            ${CACHE_FLAG} \
            --build-arg CEPH_TAG=${VERSION} \
            --build-arg OTTO_VERSION=latest \
            --build-arg O8_VERSION=latest \
            -t ${IMAGE_TAG} \
            --metadata-file metadata.json \
            --push \
            .

          DIGEST=$(jq -r '."containerimage.digest"' metadata.json)
          IMAGE_DIGEST="harbor.clyso.com/clyso-tools/clyso-tools@${DIGEST}"
          
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_digest=${IMAGE_DIGEST}" >> $GITHUB_OUTPUT

      - name: Sign image with Cosign
        env:
          IMAGE_DIGEST: ${{ steps.build-push.outputs.image_digest }}
          IMAGE_TAG: ${{ steps.build-push.outputs.image_tag }}
        run: |
          echo "Signing image:"
          echo "  Tag:    ${IMAGE_TAG}"
          echo "  Digest: ${IMAGE_DIGEST}"
          echo ""
          
          cosign sign --yes ${IMAGE_DIGEST}
          echo "Image signed successfully"

      - name: Verify image signature
        env:
          IMAGE_DIGEST: ${{ steps.build-push.outputs.image_digest }}
        run: |
          echo "Verifying signature for: ${IMAGE_DIGEST}"
          
          cosign verify ${IMAGE_DIGEST} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          
          echo "Signature verified successfully"